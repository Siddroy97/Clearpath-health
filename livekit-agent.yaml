# LiveKit Cloud agent deployment config
# Deploy with: lk cloud deploy --agent-name clearpath-health-agent

agent:
  name: clearpath-health-agent
  build:
    dockerfile: Dockerfile
    context: .
  env:
    - LIVEKIT_URL
    - LIVEKIT_API_KEY
    - LIVEKIT_API_SECRET
    - ANTHROPIC_API_KEY
    - DEEPGRAM_API_KEY
    - ELEVENLABS_API_KEY
    - GOOGLE_SERVICE_ACCOUNT_JSON
    - GOOGLE_SHEET_ID
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_FROM_NUMBER
    - TWILIO_ENABLED
    - PATIENT_PHONE_NUMBER
    - LIVEKIT_SIP_TRUNK_ID
